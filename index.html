    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; font-family: 'Plus Jakarta Sans', sans-serif; color: #ffffff; overflow-x: hidden; scroll-behavior: smooth; box-sizing: border-box; }

    ::-webkit-scrollbar{ width:10px; } ::-webkit-scrollbar-track{ background:transparent; } ::-webkit-scrollbar-thumb{ background:#aaaaaa; border-radius:999px; } ::-webkit-scrollbar-thumb:hover{ background:#bdbdbd; } html{ scrollbar-width:thin; scrollbar-color:#aaaaaa transparent; }

    /* Bảo vệ tất cả hình ảnh không cho phép kéo thả để tải xuống */
    img {
        -webkit-user-drag: none;
        khtml-user-drag: none;
        moz-user-drag: none;
        o-user-drag: none;
        user-drag: none;
    }

    .marquee-wrapper{
        position: relative;
        width: 98%; 
        max-width: 1850px;
        margin-top: 35px;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 40px;

        background: linear-gradient(90deg, #ff6699, #ff70a0);
        color: #000;
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 20px;
        letter-spacing: 2px;
        padding: 18px 0;

        text-transform: uppercase;
        overflow: hidden;
        white-space: nowrap;

        border-radius: 16px;
        box-shadow: 0 5px 20px rgba(252, 168, 189, 0.4);

        box-sizing: border-box;
    }

    .content-wrapper {
        width: 97%;
        max-width: 1600px;
        margin: 0 auto;
        box-sizing: border-box;
    }

    .marquee-track{
        display:flex;
        width:max-content;
        animation:marquee 28s linear infinite;
    }

    .marquee-content{
        display:flex;
        align-items:center;
        gap:40px;
        flex-shrink:0;
        padding-right:40px;
    }

    @keyframes marquee{
        from{
            transform:translateX(0);
        }
        to{
            transform:translateX(-50%);
        }
    }

    /* ==========================================================================
       BỘ FIX LỖI MOBILE - ÉP TRÀN MÀN HÌNH & CĂN GIỮA TUYỆT ĐỐI

            align-items: flex-start !important;

        }
        .bottom-avatar {
            width: 100px !important;  /* Thu nhỏ avatar lại vừa vặn */
            height: 100px !important;
            border: 5px solid #ffffff !important;
        }
        .bottom-avatar-name {

        }
        .bottom-avatar-subtext {
            font-size: 14px !important; /* Tăng nhẹ font subtext */
        }
        .bottom-letter-box {

        .header-nav { width: 100%; max-width: 1600px; margin: 30px auto; background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); padding: 18px 40px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); box-sizing: border-box; position: sticky; top: 20px; z-index: 1000; }

        .logo-icon { width: 60px; height: 60px; border-radius: 20px; object-fit: cover; }

        .nav-links { display: flex; align-items: center; }

        .nav-links a:after { content: ''; position: absolute; width: 0; height: 2px; bottom: 0; left: 0; background-color: #ff70a0; transition: width 0.3s ease; }

        .nav-links a:hover { color: #ffffff; transform: translateY(-3px); }

        .nav-links a.active { color: #ffffff; transform: none; }
        .nav-links a.active:after { width: 100%; }

        .separator { color: #aaaaaa; margin-left: 25px; font-size: 18px; }

        #contact-section { scroll-margin-top: 140px; }
        #product-section { scroll-margin-top: 140px; }
        #reviews-section { scroll-margin-top: 140px; }

        .hero-container { width: 100%; max-width: 1600px; margin: 90px auto 40px auto; padding: 0; display: grid; grid-template-columns: 1.4fr 1fr; gap: 60px; align-items: center; box-sizing: border-box; }
        .hero-text h1 { font-family: 'Montserrat', sans-serif; font-size: 120px; font-weight: 900; line-height: 1.05; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .hero-text .outline { color: #0d0d0d; text-shadow: -2px -2px 0 #ff70a0, 2px -2px 0 #ff70a0, -2px 2px 0 #ff70a0, 2px 2px 0 #ff70a0; }
        .hero-text p { margin: 25px 0 0 0; font-size: 18px; color: #aaaaaa; }

        .hero-right { display: flex; flex-direction: column; justify-content: center; gap: 25px; transform: translateY(-22px); }

        .stat-box h2 { font-family: 'Montserrat', sans-serif; font-size: 80px; color: #ff70a0; margin: 0; }
        .stat-box p { font-size: 20px; margin: 0; color: #ffffff; font-weight: 500; }

        .cta-btn { background: #ff70a0; color: #0d0d0d; display: block; font-family: 'Montserrat', sans-serif; text-align: center; padding: 22px; border-radius: 16px; text-decoration: none; font-weight: 900; font-size: 30px; box-shadow: none; transition: 0.3s; margin: 0; }
        .cta-btn:hover { transform: translateY(-4px) translateY(-22px); box-shadow: none; color: #0d0d0d; }

        .section-container { width: 100%; max-width: 1600px; margin: 60px auto; padding: 0; box-sizing: border-box; }
        .divider { height: 4px; width: 100%; background-color: #ff70a0; margin: 40px auto; border-radius: 2px; }
        .title { font-family: 'Montserrat', sans-serif; font-size: 60px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 40px; }

        .youtube-highlight {
            background-color: #ff0000;
            padding: 0px 5px;

            display: inline-block;

        }

        .product-grid, .showcase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .video-card, .image-card { background: #141414; border-radius: 16px; overflow: hidden; display: block; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .video-card:hover, .image-card:hover { transform: translateY(-10px); }
        .video-card img, .image-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }

        .review-slider {
            overflow: hidden;
            display: block;
            width: 100%;              
            max-width: 1600px;      
            height: 450px;          
            margin: 0 auto; 
            position: relative;
            cursor: grab;
            user-select: none;
            mask-image: linear-gradient(to bottom, transparent, #000 8%, #000 92%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, #000 8%, #000 92%, transparent);
            touch-action: none;
        }
        .review-slider:active{cursor:grabbing;}

        .review-track {
            display: flex;
            flex-direction: column; 
            gap: 30px;
            width: 100%;
            will-change: transform; 
        }

        .review-item {
            width: 100%;
            background: #141414;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #222;
            display: flex;

        }

        }

        .review-info span {

        }

        .site-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;

        .site-credit {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #aaaaaa;   
            letter-spacing: 0.3px;
            margin: 0;
        }

        .social-icons-wrapper { display: flex; align-items: center; gap: 18px; }
        .social-icon-link { display: inline-block; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .social-icon-link img { 
            width: 50px; 
            height: 50px; 
            object-fit: contain; 
            filter: grayscale(100%) brightness(0.5); 
            opacity: 0.4; 
            transition: filter 0.3s ease, opacity 0.3s ease; 
        }

        .social-icon-link:hover { transform: translateY(-5px); }

        .social-icon-link:hover img { 
            filter: grayscale(0%) brightness(1); 
            opacity: 1; 
        }

        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lightbox-overlay.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 40px;
            font-size: 52px;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
            user-select: none;
            transition: transform 0.2s ease, color 0.2s ease, opacity 0.2s ease;
            opacity: 0.7;
        }

        .lightbox-close:hover {
            transform: scale(1.08);
            color: #ff70a0;
            opacity: 1;
        }
